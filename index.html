<!DOCTYPE html>
<!--
  MIND PALACE — gesture-driven memory twin.
  Wave your hand at the webcam, grab a memory out of the air, hear it read back.

  This is the spine. It works as-is. Everything good bolts on from here.
  If you're reading this in the future George — start at js/main.js, that's the
  switchboard. Every other file does one job and says what it does up top.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIND PALACE</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- three.js comes in as a proper ES module so the imports in js/ just work.
       Pinning the version on purpose — don't want a silent upstream change
       cooking the whole thing one morning. -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <!-- The webcam feed. Mirrored in CSS so it feels like a mirror, not a stranger
       staring back. The hand tracker reads from this every frame. -->
  <video id="webcam" autoplay playsinline></video>

  <!-- three.js paints the 3D memories onto this. -->
  <canvas id="scene"></canvas>

  <!-- Little status line bottom-left so you always know what the machine's doing:
       loading, camera on, hand seen, mouse fallback, whatever. -->
  <div id="status">booting…</div>

  <!-- Top-left toolbar (mouse-driven). -->
  <div id="toolbar">
    <button id="tb-add" title="add a new memory">＋ memory</button>
    <button id="tb-export" title="copy all memories as JSON">⤓ export</button>
  </div>

  <!-- The panel that slides in when you open a memory. Three modes: view / edit / talk. -->
  <div id="memory-card" class="hidden">
    <button id="card-close" title="shut it">✕</button>

    <!-- VIEW -->
    <div id="card-view">
      <div id="card-date"></div>
      <h2 id="card-title"></h2>
      <p id="card-body"></p>
      <div class="card-actions">
        <button id="card-speak">▶ read</button>
        <button id="card-edit">✎ edit</button>
        <button id="card-talk">💬 talk</button>
      </div>
    </div>

    <!-- EDIT (mouse) -->
    <div id="card-edit-form" class="hidden">
      <label>title <input id="edit-title" type="text" /></label>
      <label>date <input id="edit-date" type="text" placeholder="YYYY-MM" /></label>
      <label>tag
        <select id="edit-tag">
          <option value="build">build</option>
          <option value="milestone">milestone</option>
        </select>
      </label>
      <label>body (this is what gets read aloud)
        <textarea id="edit-body" rows="5"></textarea>
      </label>
      <label>links — search memories to connect (this draws the lines)</label>
      <div id="link-picker">
        <div id="link-chips"></div>
        <input id="link-search" type="text" autocomplete="off" placeholder="type to find a memory…" />
        <div id="link-results" class="hidden"></div>
      </div>
      <div class="card-actions">
        <button id="edit-save">save</button>
        <button id="edit-delete" class="danger">delete</button>
        <button id="edit-cancel">cancel</button>
      </div>
    </div>

    <!-- TALK (local model) -->
    <div id="card-chat" class="hidden">
      <div id="chat-log"></div>
      <div class="chat-row">
        <input id="chat-input" type="text" placeholder="ask servitor about this memory…" />
        <button id="chat-send">send</button>
      </div>
      <div id="chat-model"></div>
    </div>
  </div>

  <!-- Crosshairs are spawned per-hand in interaction.js (up to two), so you can
       see both fingertips when you're two-handing it. -->

  <!-- Bottom-right: live readout of exactly what the tracker is seeing per hand —
       handedness, gesture, pinch distance, fingertip coords, what it's doing. -->
  <div id="hud">tracker: booting…</div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
